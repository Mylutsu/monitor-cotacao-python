<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Monitor de Moedas</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; /* Fundo Escuro (Dark Mode) */
            color: white; 
            text-align: center; 
            padding: 50px; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 15px; 
            display: inline-block; 
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h1 { color: #00ff88; margin-bottom: 30px; }
        .moeda { 
            font-size: 1.4em; 
            margin: 15px 0; 
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        strong { color: #00d4ff; }
        button {
            background: #00ff88;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background: #00cc6e; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="card">
        <h1>Cotações Atuais</h1>
        
        <div class="moeda">Dólar: <strong>R$ {{ moedas.dolar }}</strong></div>
        <div class="moeda">Euro: <strong>R$ {{ moedas.euro }}</strong></div>
        <div class="moeda">Bitcoin: <strong>R$ {{ moedas.btc }}</strong></div>

        <button onclick="window.location.reload()">Atualizar Agora</button>
    </div>

    <div class="card" style="margin-top: 20px; display: block;">
    <h3>Histórico Recente (SQL)</h3>
    
    <a href="/limpar" style="text-decoration: none;">
        <button style="background: #ff4444; margin-bottom: 15px;">🗑️ Limpar Histórico</button>
    </a>

    <table style="width: 100%; border-collapse: collapse;">
        </table>
</div>

    <div class="card" style="margin-top: 20px; display: block;">
        <h3>Histórico Recente (SQL)</h3>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 2px solid #00ff88;">
                    <th>Moeda</th>
                    <th>Valor</th>
                    <th>Data/Hora</th>
                </tr>
            </thead>
            <tbody>
                {% for item in lista %}
                <tr style="border-bottom: 1px solid #333;">
                    <td>{{ item[0] }}</td>
                    <td>R$ {{ item[1] }}</td>
                    <td style="font-size: 0.8em;">{{ item[2] }}</td>
                    
                    <td>
                        <form action="/editar/{{ item[4] }}" method="POST" style="display: flex;">
                            <input type="text" name="anotacao" placeholder="Nota..." 
                                value="{{ item[3] if item[3] else '' }}" 
                                style="background: #333; color: white; border: 1px solid #444; border-radius: 3px; padding: 2px;">
                            <button type="submit" style="margin: 0 0 0 5px; padding: 2px 5px; font-size: 0.7em; background: #00d4ff;">💾</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
